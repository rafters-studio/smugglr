# d1-sync Configuration
# Copy to config.toml and fill in your values

# =============================================================================
# Cloudflare Credentials
# =============================================================================
# Find these in the Cloudflare dashboard:
# - Account ID: Account Home > right sidebar
# - Database ID: Workers & Pages > D1 > your database > Database ID
# - API Token: Create at https://dash.cloudflare.com/profile/api-tokens
#   Required permissions: D1:Read, D1:Write

cloudflare_account_id = "your-32-char-account-id"
cloudflare_api_token = "your-api-token-with-d1-permissions"
database_id = "your-d1-database-uuid"

# =============================================================================
# Local Database
# =============================================================================
# Path to your local SQLite database.
#
# If using Wrangler for local D1 development, it creates databases at:
#   .wrangler/state/v3/d1/miniflare-D1DatabaseObject/<hash>.sqlite
#
# The hash is derived from your database binding name. If you have multiple
# databases, check file sizes or `ls -lt` to find the right one.

local_db = ".wrangler/state/v3/d1/miniflare-D1DatabaseObject/xxx.sqlite"

# =============================================================================
# Sync Settings
# =============================================================================
[sync]

# Tables to sync (empty array = all tables except excluded)
# Example: tables = ["users", "posts", "comments"]
tables = []

# Tables to never sync (system tables, migrations, etc.)
exclude_tables = [
    "sqlite_sequence",
    "_cf_KV",
    "_cf_METADATA",
    "__drizzle_migrations",
    "d1_migrations",
]

# Column name used for timestamp-based change detection.
# If a table has this column, timestamps are compared to determine which
# side has newer data. If the column doesn't exist, falls back to content hash.
timestamp_column = "updated_at"

# How to resolve conflicts when both sides have changes to the same row.
#
# Options:
#   "local_wins"  - Local version overwrites remote (default)
#                   Best for: dev -> prod workflows
#
#   "remote_wins" - Remote version overwrites local
#                   Best for: prod -> dev sync, pulling latest data
#
#   "newer_wins"  - Most recent updated_at wins
#                   Best for: master-master replication
#                   Note: Rows without timestamps are skipped in conflicts
conflict_resolution = "local_wins"

# =============================================================================
# Retry Settings
# =============================================================================
# Configure retry behavior for transient failures (rate limits, server errors).
# The tool uses exponential backoff: delay = initial_retry_delay_ms * (backoff_multiplier ^ attempt)

# Maximum number of retry attempts before giving up (default: 5)
# Set to 0 to disable retries
max_retries = 5

# Initial delay in milliseconds before the first retry (default: 1000)
# Subsequent retries will be exponentially longer
initial_retry_delay_ms = 1000

# Maximum delay in milliseconds between retries (default: 60000)
# Caps the exponential backoff to prevent extremely long waits
max_retry_delay_ms = 60000

# Multiplier for exponential backoff (default: 2.0)
# Each retry waits (previous_delay * backoff_multiplier)
# Example with defaults: 1s -> 2s -> 4s -> 8s -> 16s
backoff_multiplier = 2.0

# =============================================================================
# Stash Settings (optional)
# =============================================================================
# Configure S3-compatible relay sync for cross-machine synchronization.
# Use `smuggler stash` to upload local state and `smuggler retrieve` to download.
#
# Supports:
#   s3://bucket/path    - Amazon S3
#   s3://bucket/path    - Cloudflare R2 (set endpoint below)
#   s3://bucket/path    - MinIO (set endpoint below)
#   file:///local/path  - Local filesystem (useful for testing)

# [stash]
# url = "s3://my-bucket/smuggler/relay.sqlite"
# access_key_id = "your-access-key"
# secret_access_key = "your-secret-key"
# region = "us-east-1"
# endpoint = "https://account-id.r2.cloudflarestorage.com"
